nom: Mijoté de porc aux patates douces
nom_court: Mijoté porc patates douces
source: Caty
portions: 4.0
se_congele: yes
categories:
- Porc
- Mijoteuse
temps:
  preparation: 20
  cuisson: 480
  refrigeration: ~
preparation:
- section: Préparation
  etapes:
  - etape: Déposer patates douces dans la mijoteuse.
    ingredients:
    - nom: Patate douce pelée et coupée en cubes
      qte: 2.0
      uni: unité
      rangee: Fruits et legumes
    equipements: Mijoteuse
  - etape: Faire dorer les cubes de porc à la poêle et transférer dans la mijoteuse.
    ingredients:
    - nom: Cubes de porc à ragoût
      qte: 795.0
      uni: g
      rangee: Viandes et substituts
      qte_masse: 795.0
      uni_masse: g
    - nom: Huile de canola
      qte: 30.0
      uni: ml
      rangee: Epicerie
      qte_volume: 30.0
      uni_volume: ml
    equipements:
    - Poêle
    - Mijoteuse
  - etape: Cuire oignons, ail et céleri dans la poêle, saupoudrer de farine, transférer
      dans la mijoteuse.
    ingredients:
    - nom: Oignon perlé pelé
      qte: 12.0
      uni: unité
      rangee: Fruits et legumes
    - nom: Ail haché
      qte: 10.0
      uni: ml
      rangee: Fruits et legumes
      qte_volume: 10.0
      uni_volume: ml
    - nom: Branche de céleri émincée
      qte: 2.0
      uni: unité
      rangee: Fruits et legumes
    - nom: Farine
      qte: 60.0
      uni: ml
      rangee: Epicerie
      qte_volume: 60.0
      uni_volume: ml
    equipements:
    - Poêle
    - Mijoteuse
  - etape: Ajouter bouillon, sirop d’érable, feuille de laurier, romarin, sel et poivre,
      puis cuire 8 à 10 heures à faible intensité.
    ingredients:
    - nom: Bouillon de poulet
      qte: 1000.0
      uni: ml
      rangee: Conserves et sauces
      qte_volume: 1000.0
      uni_volume: ml
    - nom: Sirop d’érable
      qte: 80.0
      uni: ml
      rangee: Epicerie
      qte_volume: 80.0
      uni_volume: ml
    - nom: Feuille de laurier
      qte: 1.0
      uni: unité
      rangee: Epicerie
    - nom: Tige de romarin
      qte: 1.0
      uni: unité
      rangee: Fruits et legumes
    - nom: Sel et poivre
      qte: 1.0
      uni: au goût
      rangee: Epicerie
    equipements: Mijoteuse
commentaires: Un mijoté réconfortant qui se prépare lentement à la mijoteuse pour
  des saveurs optimales.
