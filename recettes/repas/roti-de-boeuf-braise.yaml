preparation:
- section: Préparation principale
  etapes:
  - etape: Dans une cocotte ou un faitout épais fermé par un couvercle hermétique,
      mélanger le bouillon, les pommes de terre, les champignons, les carottes, le
      céleri, l’oignon, l’ail, la sauce Worcestershire, le thym, la pâte de tomate
      et la feuille de laurier. Mijoter à feu moyen.
    image_guid: ~
    ingredients:
    - nom: Bouillon de Boeuf avec du Vin Rouge avec 30 % moins de sodium
      qte: 2.5
      uni: tasse
      qte_masse: ~
      uni_masse: ~
      qte_volume: 625
      uni_volume: ml
      rangee: Conserves et sauces
    - nom: petites pommes de terre, coupées en deux
      qte: 3
      uni: tasse
      qte_masse: ~
      uni_masse: ~
      qte_volume: 750
      uni_volume: ml
      rangee: Fruits et legumes
