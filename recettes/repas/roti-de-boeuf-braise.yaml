    equipements:
    - Cocotte
    - Faitout
  - etape: Saler et poivrer le rôti de tous les côtés, au goût. Plonger dans la sauce
      et les légumes qui mijotent. Réduire le feu, couvrir et mijoter de 2 heures
      et demie à 3 heures et demie ou jusqu’à ce que le bœuf soit tendre et se défasse
      à la fourchette.
    image_guid: ~
    ingredients:
    - nom: rôti de boeuf, sans l’os
      qte: 1.5
      uni: kg
      qte_masse: 1.5
      uni_masse: kg
      qte_volume: ~
      uni_volume: ~
      rangee: Viandes et substituts
    equipements: []
  - etape: Transférer le rôti de bœuf et les légumes dans un plat de service. Incorporer
      le mélange de fécule de maïs dans le liquide de cuisson qui mijote. Cuire en
      remuant jusqu’à l’obtention d’une texture plus épaisse, environ une minute.
      Servir avec le rôti de bœuf et les légumes.
    image_guid: ~
    ingredients:
    - nom: fécule de maïs
      qte: 1
      uni: c. à soupe
      qte_masse: ~
      uni_masse: ~
      qte_volume: 1
      uni_volume: c. à soupe
      rangee: Epicerie
    equipements: Plat de service
- section: Conseil (Facultatif)
  etapes:
  - etape: Pour plus de saveur et une couleur plus riche, saisir le rôti de bœuf entier
      avec 1 c. à soupe d’huile de canola dans une poêle à feu moyen-vif avant de
      l’ajouter aux autres ingrédients dans le faitout.
    image_guid: ~
    ingredients: []
    equipements: Poêle
- section: Suggestion de service
  etapes:
  - etape: Servir avec une salade ou un pain croûté pour imbiber la délicieuse sauce.
    image_guid: ~
