            qte: 1
            uni: kg
            qte_masse: 1
            uni_masse: kg
            qte_volume: null
            uni_volume: null
            rangee: Fruits et legumes
        equipements: []
      - etape: À l’aide d’un pilon à pommes de terre, écraser grossièrement les pommes de terre avec 30 ml (2 c. à soupe) du beurre. À l’aide d’un batteur électrique, réduire le mélange en purée avec le lait. Saler et poivrer. Réserver.
