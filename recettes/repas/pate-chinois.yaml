preparation:
  - section: Préparation générale
    etapes:
      - etape: Déposer les pommes de terre dans une casserole. Couvrir d’eau froide. Saler. Porter à ébullition et laisser mijoter 25 minutes ou jusqu’à ce que les pommes de terre soient très tendres. Égoutter. Remettre dans la casserole.
