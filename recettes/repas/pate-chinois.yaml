      - etape: Placer la grille au centre du four. Préchauffer le four à 190 °C (375 °F).
        image_guid: null
        ingredients: []
        equipements: []
      - etape: Entre-temps, dans une grande poêle à feu moyen-élevé, dorer l'oignon dans le reste du beurre. Ajouter la viande et cuire en l'émiettant à la cuillère de bois jusqu'à ce qu'elle soit dorée. Saler et poivrer.
