nom: Jambon à l’érable et à l’ananas à la mijoteuse
nom_court: Jambon érable ananas
source: Caty
portions: 6.0
se_congele: yes
categories:
- Porc
- Mijoteuse
temps:
  preparation: 10
  cuisson: 240
  refrigeration: ~
preparation:
- section: Préparation
  etapes:
  - etape: Déposer le jambon dans la mijoteuse.
    ingredients:
    - nom: Jambon cuit (tranche ou cube)
      qte: 1134.0
      uni: g
      rangee: Viandes et substituts
      qte_masse: 1134.0
      uni_masse: g
    equipements: Mijoteuse
  - etape: Mélanger sirop d’érable, cassonade, moutarde de Dijon et vinaigre de cidre
      dans un bol.
    ingredients:
    - nom: Sirop d’érable
      qte: 180.0
      uni: ml
      rangee: Epicerie
      qte_volume: 180.0
      uni_volume: ml
    - nom: Cassonade
      qte: 60.0
      uni: ml
      rangee: Epicerie
      qte_volume: 60.0
      uni_volume: ml
    - nom: Moutarde de Dijon
      qte: 15.0
      uni: ml
      rangee: Epicerie
      qte_volume: 15.0
      uni_volume: ml
    - nom: Vinaigre de cidre
      qte: 15.0
      uni: ml
      rangee: Epicerie
      qte_volume: 15.0
      uni_volume: ml
    equipements:
    - Bol
    - Fouet
  - etape: Ajouter le sirop et le jus d’ananas dans la mijoteuse, verser le mélange
      d’érable dessus.
    ingredients:
    - nom: Rondelle d’ananas (jus inclus)
      qte: 1.0
      uni: unité
      rangee: Fruits et legumes
    - nom: Jus d’ananas
      qte: 125.0
      uni: ml
      rangee: Fruits et legumes
      qte_volume: 125.0
      uni_volume: ml
    equipements: Mijoteuse
  - etape: Déposer les rondelles d’ananas sur le jambon et piquer chaque rondelle
      avec un clou de girofle.
    ingredients:
    - nom: Clou de girofle
      qte: 6.0
      uni: unité
      rangee: Epicerie
    equipements: Mijoteuse
  - etape: Couvrir et cuire 4 heures à faible intensité (Low).
    ingredients: []
    equipements: Mijoteuse
  - etape: 30 minutes avant la fin, délayer fécule de maïs dans l’eau et ajouter pour
      épaissir la sauce.
    ingredients:
    - nom: Fécule de maïs
      qte: 15.0
      uni: ml
      rangee: Epicerie
      qte_volume: 15.0
      uni_volume: ml
    - nom: Eau
      qte: 30.0
      uni: ml
      rangee: Epicerie
      qte_volume: 30.0
      uni_volume: ml
    equipements:
    - Bol
    - Mijoteuse
commentaires: Plat sucré-salé parfait avec riz ou légumes.
