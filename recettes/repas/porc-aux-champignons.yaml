nom: Médaillons de porc, sauce crémeuse aux champignons et à l’érable
nom_court: Médaillons porc sauce champignons
source: Trois fois par jour
portions: 3.0
se_congele: yes
categories:
- Porc
- Sauce
temps:
  preparation: 10
  cuisson: 15
  refrigeration: ~
preparation:
- section: Préparation
  etapes:
  - etape: Délayer la fécule de maïs dans l’eau et réserver.
    ingredients:
    - nom: Fécule de maïs
      qte: 2.0
      uni: c. à thé
      rangee: Epicerie
      qte_volume: 2.0
      uni_volume: c. à thé
    - nom: Eau
      qte: 60.0
      uni: ml
      rangee: Epicerie
      qte_volume: 60.0
      uni_volume: ml
    equipements:
    - Bol
    - Cuillère
  - etape: Couper le filet de porc en médaillons, assaisonner sel et poivre.
    ingredients:
    - nom: Filet de porc
      qte: 1.0
      uni: unité
      rangee: Viandes et substituts
    - nom: Sel et poivre
      qte: 1.0
      uni: au goût
      rangee: Epicerie
    equipements:
    - Planche à découper
    - Couteau
  - etape: Faire chauffer beurre dans poêle, saisir les champignons et réserver.
    ingredients:
    - nom: Beurre
      qte: 1.0
      uni: c. à soupe
      rangee: Produits laitiers et oeufs
      qte_volume: 1.0
      uni_volume: c. à soupe
    - nom: Champignons blancs (ou autres)
      qte: 227.0
      uni: g
      rangee: Fruits et legumes
      qte_masse: 227.0
      uni_masse: g
    equipements:
    - Poêle
    - Spatule
  - etape: Ajouter huile et saisir les médaillons 2 min de chaque côté.
    ingredients:
    - nom: Huile végétale
      qte: 1.0
      uni: c. à soupe
      rangee: Epicerie
      qte_volume: 1.0
      uni_volume: c. à soupe
    equipements: Poêle
  - etape: Ajouter champignons, mélange de fécule et le reste des ingrédients, porter
      à ébullition et laisser mijoter 5 minutes.
    ingredients:
    - nom: Sirop d’érable
      qte: 60.0
      uni: ml
      rangee: Epicerie
      qte_volume: 60.0
      uni_volume: ml
    - nom: Vinaigre balsamique
      qte: 2.0
      uni: c. à soupe
      rangee: Epicerie
      qte_volume: 2.0
      uni_volume: c. à soupe
    - nom: Crème champêtre 15 %
      qte: 60.0
      uni: ml
      rangee: Produits laitiers et oeufs
      qte_volume: 60.0
      uni_volume: ml
    - nom: Ciboulette émincée
      qte: 2.0
      uni: c. à soupe
      rangee: Fruits et legumes
      qte_volume: 2.0
      uni_volume: c. à soupe
    equipements: Poêle
commentaires: Recette sans gluten, œufs et noix.
