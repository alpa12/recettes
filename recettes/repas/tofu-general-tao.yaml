preparation:
- section: Recette
  etapes:
  - etape: Couper le tofu en dés et bien l’enrober de fécule de maïs.
    image_guid: ~
    ingredients:
    - nom: Tofu ferme
      qte: 1.0
      uni: bloc
      qte_masse: 450.0
      uni_masse: g
      rangee: Viandes et substituts
    - nom: Fécule de maïs
      qte: 0.25
      uni: tasse
      qte_volume: 0.25
      uni_volume: tasse
      rangee: Epicerie
    equipements: []
  - etape: Dans une casserole faire chauffer l’huile. Ajouter les cubes de tofu et
      les faire revenir jusqu’a ce qu’ils soient bien dorés et croustillants. Ajouter
      de l’huile si nécessaire.
    image_guid: ~
    ingredients:
    - nom: Huile végétale
      qte: 3.0
      uni: c. à soupe
      qte_volume: 3.0
      uni_volume: c. à soupe
      rangee: Epicerie
    equipements: []
  - etape: Incorporer l’ail, le gingembre, le sirop d’érable, la sauce soya, le ketchup,
      la sauce sriracha, les oignons verts et le bouillon de légume.
    image_guid: ~
