preparation:
- etapes:
  - etape: Couper le tofu en dés et bien l’enrober de fécule de maïs.
    ingredients:
    - nom: Tofu ferme
      qte: 1
      uni: bloc
      qte_masse: 450
      uni_masse: g
      rangee: Viandes et substituts
    - nom: Fécule de maïs
      qte: 0.25
      uni_volume: tasse
      rangee: Epicerie
  - etape: Dans une casserole faire chauffer l’huile. Ajouter les cubes de tofu et
      les faire revenir jusqu’a ce qu’ils soient bien dorés et croustillants. Ajouter
      de l’huile si nécessaire.
    ingredients:
    - nom: Huile végétale
      qte: 3
      uni_volume: c. à soupe
      rangee: Epicerie
  - etape: Incorporer l’ail, le gingembre, le sirop d’érable, la sauce soya, le ketchup,
      la sauce sriracha, les oignons verts et le bouillon de légume.
    ingredients:
    - nom: Ail haché
      qte: 2
      uni: gousses
      rangee: Fruits et legumes
    - nom: Gingembre haché
      qte: 1
      uni_volume: c. à soupe
      rangee: Fruits et legumes
    - nom: Sirop d'érable
      qte: 2
      uni_volume: c. à soupe
      rangee: Epicerie
    - nom: Sauce soya
      qte: 2
      uni_volume: c. à soupe
      rangee: Conserves et sauces
    - nom: Ketchup
      qte: 2
      uni_volume: c. à soupe
      rangee: Conserves et sauces
    - nom: Sauce sriracha
      qte: 1
      uni_volume: c. à thé
      rangee: Conserves et sauces
    - nom: Oignons verts émincés
      qte: 3
      uni: unité
      rangee: Fruits et legumes
    - nom: Bouillon de légumes
      qte: 0.75
      uni_volume: tasse
      rangee: Conserves et sauces
  - etape: Laisser réduire quelques minutes et servir.
