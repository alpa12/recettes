            qte_masse: null
            uni_masse: null
            qte_volume: 15
            uni_volume: ml
            rangee: Epicerie
          - nom: Cumin moulu
            qte: 5
            uni: ml
            qte_masse: null
            uni_masse: null
            qte_volume: 5
            uni_volume: ml
            rangee: Epicerie
        equipements: []
  - section: Assemblage des burritos
    etapes:
      - etape: Sur un plan de travail, déposer les tortillas. Répartir, en superposant, le riz, la laitue, le mélange de viande, la salsa, le maïs et le fromage. Replier les tortillas sur les garnitures de chaque côté, puis les rouler fermement en emprisonnant les garnitures. Retourner les burritos afin que le joint soit en dessous (voir note). Couper en deux. Servir et accompagner de salsa, si désiré.
        image_guid: null
        ingredients:
          - nom: Tortilla de blé
            qte: 4
            uni: unité
            qte_masse: null
            uni_masse: null
            qte_volume: null
            uni_volume: null
            rangee: Epicerie
