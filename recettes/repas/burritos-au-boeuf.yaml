  - section: Note de l'équipe Ricardo
    etapes:
      - etape: Pour obtenir des burritos à l’extérieur croustillant, placez ceux-ci sur une plaque de cuisson antiadhésive ou tapissée de papier parchemin. Faites cuire sur la grille au centre du four à 220 °C (425 °F) 6 minutes. Retournez les burritos et poursuivez la cuisson 6 minutes.
        image_guid: null
        ingredients: []
        equipements:
          - plaque de cuisson antiadhésive
          - four
