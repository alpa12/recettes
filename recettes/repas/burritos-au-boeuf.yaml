preparation:
  - section: Cuisson du riz
    etapes:
      - etape: Dans une petite casserole, porter à ébullition l’eau, le riz et le sel. Couvrir et cuire à feu très doux 8 minutes. Retirer du feu et laisser reposer 4 minutes.
        image_guid: null
        ingredients:
          - nom: Eau froide
            qte: 180
            uni: ml
            qte_masse: null
            uni_masse: null
            qte_volume: 180
            uni_volume: ml
            rangee: Epicerie
          - nom: Riz basmati
            qte: 100
            uni: g
            qte_masse: 100
            uni_masse: g
            qte_volume: null
            uni_volume: null
            rangee: Epicerie
          - nom: Sel
            qte: 0.25
            uni: c. à thé
            qte_masse: null
            uni_masse: null
            qte_volume: 0.25
            uni_volume: c. à thé
            rangee: Epicerie
        equipements: []
  - section: Cuisson de la garniture de bœuf
    etapes:
      - etape: Dans une grande poêle antiadhésive à feu moyen-élevé, cuire le bœuf dans l’huile 5 minutes en l’émiettant à la cuillère de bois. Saler et poivrer.
        image_guid: null
        ingredients:
          - nom: Bœuf haché maigre
            qte: 450
            uni: g
            qte_masse: 450
            uni_masse: g
            qte_volume: null
            uni_volume: null
            rangee: Viandes et substituts
          - nom: Huile végétale
            qte: 15
            uni: ml
            qte_masse: null
            uni_masse: null
            qte_volume: 15
            uni_volume: ml
            rangee: Epicerie
        equipements:
          - grande poêle antiadhésive
          - cuillère de bois
      - etape: Ajouter le poivron et poursuivre la cuisson 3 minutes.
        image_guid: null
        ingredients:
          - nom: Poivron rouge
            qte: 1
            uni: unité
            qte_masse: null
            uni_masse: null
            qte_volume: null
            uni_volume: null
            rangee: Fruits et legumes
        equipements: []
      - etape: Ajouter les haricots noirs et les épices (assaisonnement au chili, cumin moulu). Bien mélanger. Rectifier l’assaisonnement.
        image_guid: null
        ingredients:
          - nom: Haricot noir
            qte: 1
            uni: boîte
            qte_masse: null
            uni_masse: null
            qte_volume: null
