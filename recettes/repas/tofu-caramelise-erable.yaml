nom: Tofu caramélisé à l’érable
nom_court: Tofu caramelise erable
source: Ricardo
portions: 4.0
se_congele: yes
difficulte: ~
cout: ~
allergenes: []
categories:
- Plats principaux
- Tofu
- Végétarien
- Végétalien
- Rapide
- Recettes de semaine
- Petits prix
temps:
  preparation: 20
  cuisson: 12
  refrigeration: ~
preparation:
- section: Tofu
  etapes:
  - etape: Déchirer le tofu en morceaux et le déposer dans un bol. Saupoudrer de la
      fécule et bien mélanger pour enrober le tofu.
    image_guid: ~
    ingredients:
    - nom: tofu ferme
      qte: 450.0
      uni: g
      rangee: Viandes et substituts
      qte_masse: 450.0
      uni_masse: g
    - nom: fécule de maïs
      qte: 45.0
      uni: g
      rangee: Epicerie
      qte_masse: 45.0
      uni_masse: g
    equipements: []
  - etape: Dans une grande poêle antiadhésive à feu moyen-élevé, cuire le tofu dans
      l’huile 10 minutes ou jusqu’à ce qu’il soit bien doré de tous les côtés et très
      croustillant.
    image_guid: ~
    ingredients:
    - nom: huile végétale
      qte: 45.0
      uni: ml
      rangee: Epicerie
      qte_volume: 45.0
      uni_volume: ml
    equipements: []
- section: Sauce à l'érable
  etapes:
  - etape: Entre-temps, dans un autre bol, mélanger au fouet tous les ingrédients,
      sauf l’oignon vert.
    image_guid: ~
    ingredients:
    - nom: sirop d’érable
      qte: 163.0
      uni: g
      rangee: Epicerie
      qte_masse: 163.0
      uni_masse: g
    - nom: sauce hoisin
      qte: 93.0
      uni: g
      rangee: Conserves et sauces
      qte_masse: 93.0
      uni_masse: g
    - nom: sauce soya réduite en sodium
      qte: 34.0
      uni: g
      rangee: Conserves et sauces
      qte_masse: 34.0
      uni_masse: g
    - nom: vinaigre de riz
      qte: 10.0
      uni: g
      rangee: Epicerie
      qte_masse: 10.0
      uni_masse: g
    - nom: condiment épicé au chili ou sauce sriracha
      qte: 10.0
      uni: g
      rangee: Conserves et sauces
      qte_masse: 10.0
      uni_masse: g
    - nom: ail
      qte: 2.0
      uni: gousse
      rangee: Fruits et legumes
    equipements:
    - bol
    - fouet
  - etape: Dans la poêle, verser le mélange de sirop d’érable. Poursuivre la cuisson
      de 3 à 4 minutes ou jusqu’à ce que la sauce soit sirupeuse, en remuant pour
      bien en enrober le tofu.
    image_guid: ~
    ingredients: []
    equipements: []
  - etape: Garnir de l’oignon vert. Accompagner d’un riz blanc et d’un légume vert,
      si désiré.
    image_guid: ~
    ingredients:
    - nom: oignon vert
      qte: 1.0
      uni: oignon
      rangee: Fruits et legumes
    equipements: []
commentaires:
- commentaire: Essayer de mettre le tofu au four, au lieu d’à la poêle. Essayer 2
    fois le tofu pour 1.5 fois la sauce.
  date: 2026/02/19
  auteur: Élodie Bourgeois
  evaluation: 4
