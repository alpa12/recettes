nom: Tarte à la crème de Monique
nom_court: Tarte à la crème
source: Nathalie Rivard
portions: 8.0
se_congele: no
categories:
- Tarte
- Dessert
temps:
  preparation: 30
  cuisson: 30
  refrigeration: 120
preparation:
- section: Croûte
  etapes:
  - etape: Beurrer une assiette à tarte de 9 po minimum, mélanger les ingrédients
      et taper au fond.
    ingredients:
    - nom: Miettes de biscuit Graham
      qte: 1.25
      uni: tasse
      rangee: Epicerie
      qte_volume: 1.25
      uni_volume: tasse
    - nom: Beurre fondu
      qte: 0.25
      uni: tasse
      rangee: Produits laitiers et oeufs
      qte_volume: 0.25
      uni_volume: tasse
    - nom: Sucre
      qte: 0.25
      uni: tasse
      rangee: Epicerie
      qte_volume: 0.25
      uni_volume: tasse
    equipements:
    - Assiette à tarte
    - Bol
    - Cuillère
- section: Crème patissière
  etapes:
  - etape: Mélanger les ingrédients dans un bol à bain-marie, cuire en remuant jusqu’à
      épaississement, verser sur la croûte.
    ingredients:
    - nom: Lait
      qte: 2.0
      uni: tasse
      rangee: Produits laitiers et oeufs
      qte_volume: 2.0
      uni_volume: tasse
    - nom: Jaune d'œuf
      qte: 3.0
      uni: unité
      rangee: Produits laitiers et oeufs
    - nom: Sucre
      qte: 5.0
      uni: c. à soupe
      rangee: Epicerie
      qte_volume: 5.0
      uni_volume: c. à soupe
    - nom: Sel
      qte: 1.0
      uni: pincée
      rangee: Epicerie
    equipements:
    - Bol
    - Bain-marie
    - Fouet
- section: Meringue
  etapes:
  - etape: Monter les blancs d’œufs au batteur électrique, ajouter le sucre progressivement
      jusqu’à pics fermes.
    ingredients:
    - nom: Blanc d'oeuf
      qte: 3.0
      uni: unité
      rangee: Produits laitiers et oeufs
    - nom: Sucre
      qte: 3.0
      uni: c. à soupe
      rangee: Epicerie
      qte_volume: 3.0
      uni_volume: c. à soupe
    equipements:
    - Batteur électrique
    - Bol
  - etape: Étendre la meringue sur la crème pâtissière.
    ingredients: []
    equipements: Spatule
- section: Finale
  etapes:
  - etape: Cuire au four 350°F environ 5 minutes jusqu’à ce que la meringue brunisse,
      puis réfrigérer au moins 2 heures.
    ingredients: []
    equipements: Four
commentaires: Étapes à clarifier la prochaine fois!
