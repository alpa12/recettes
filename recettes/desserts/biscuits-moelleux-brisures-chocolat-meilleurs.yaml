  - section: Cuisson
    etapes:
      - etape: Placer la grille au centre du four. Préchauffer le four à 190 °C (375 °F). Tapisser deux plaques de cuisson de papier parchemin.
        image_guid: null
        ingredients: []
        equipements:
          - Four
          - Plaque de cuisson
          - Papier parchemin
      - etape: À l’aide d’une cuillère à crème glacée d’environ 45 ml (3 c. à soupe), former des boules de pâte. Déposer 5 à 6 boules de pâte par plaque en les espaçant.
        image_guid: null
        ingredients: []
        equipements: []
      - etape: Cuire au four, une plaque à la fois, de 8 à 9 minutes ou jusqu’à ce que les biscuits soient légèrement dorés tout autour, mais encore très moelleux au centre. Laisser refroidir sur la plaque.
        image_guid: null
        ingredients: []
        equipements: []
commentaires:
  - commentaire: Il a fallu les faire cuire au moins 15 min, sûrement plus. Ne pas écraser les biscuits.
