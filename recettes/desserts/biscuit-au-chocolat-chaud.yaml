nom: Biscuits au chocolat chaud
nom_court: Biscuit chocolat chaud
source: Nathalie
portions: 12.0
se_congele: no
categories:
- Biscuit
- Chocolat
temps:
  preparation: ~
  cuisson: 14
  refrigeration: ~
preparation:
- section: Préparation des biscuits
  etapes:
  - etape: Mélanger les ingrédients secs.
    ingredients:
    - nom: Farine
      qte: 2.0
      uni: tasse
      rangee: Epicerie
      qte_volume: 2.0
      uni_volume: tasse
    - nom: Chocolat chaud en poudre
      qte: 0.5
      uni: tasse
      rangee: Epicerie
      qte_volume: 0.5
      uni_volume: tasse
    - nom: Cacao
      qte: 1.0
      uni: c. à soupe
      rangee: Epicerie
      qte_volume: 1.0
      uni_volume: c. à soupe
    - nom: Bicarbonate
      qte: 1.0
      uni: c. à thé
      rangee: Epicerie
      qte_volume: 1.0
      uni_volume: c. à thé
    - nom: Poudre à pâte
      qte: 0.5
      uni: c. à thé
      rangee: Epicerie
      qte_volume: 0.5
      uni_volume: c. à thé
    equipements:
    - Bol
    - Cuillère
  - etape: Mélanger les ingrédients mouillés au batteur électrique.
    ingredients:
    - nom: Beurre
      qte: 0.33
      uni: tasse
      rangee: Produits laitiers et oeufs
      qte_volume: 0.33
      uni_volume: tasse
    - nom: Sucre
      qte: 0.5
      uni: tasse
      rangee: Epicerie
      qte_volume: 0.5
      uni_volume: tasse
    - nom: Cassonade
      qte: 0.5
      uni: tasse
      rangee: Epicerie
      qte_volume: 0.5
      uni_volume: tasse
    - nom: Oeuf
      qte: 2.0
      uni: unité
      rangee: Produits laitiers et oeufs
    equipements: Batteur électrique
  - etape: Mélanger tout ensemble puis ajouter les pépites de chocolat.
    ingredients:
    - nom: Pépites de chocolat mi-sucré
      qte: 0.5
      uni: tasse
      rangee: Epicerie
      qte_volume: 0.5
      uni_volume: tasse
    equipements: Spatule
  - etape: Cuire au four 6 minutes à 375°F.
    ingredients: []
    equipements: Four
  - etape: Ajouter les miniguimauves et reprendre la cuisson 6 à 8 minutes.
    ingredients:
    - nom: Miniguimauves
      qte: 0.75
      uni: tasse
      rangee: Epicerie
      qte_volume: 0.75
      uni_volume: tasse
    equipements: Four
commentaires: Les miniguimauves sont facultatives.
