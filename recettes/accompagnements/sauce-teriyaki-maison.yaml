preparation:
- section: Préparation de la sauce
  etapes:
  - etape: Versez 350 ml d’eau dans une petite casserole avec le sucre, la sauce soja,
      l’ail et le gingembre. Portez doucement à ébullition en remuant de temps en
      temps, jusqu’à ce que le sucre soit dissous. Laissez mijoter encore 5 min, ou
      jusqu’à ce que la sauce devienne brillante et légèrement sirupeuse. Délayez
      la fécule de maïs dans 1 c. à soupe d’eau, puis incorporez-la rapidement à la
      sauce. Ajoutez le vinaigre de riz. Si la sauce vous semble trop épaisse, ajoutez
      un peu d’eau pour ajuster la consistance. Versez dans un bocal propre et laissez
      refroidir à température ambiante.
    image_guid: ~
