name: R Quality

on:
  pull_request:
    paths:
      - 'livrec/**'
      - 'recettes/**/*.yaml'
      - 'recettes/**/*.yml'
      - 'recettes/template.yaml'
      - 'renv.lock'
      - 'renv/settings.json'
      - '.lintr'
  push:
    branches: [main]
    paths:
      - 'livrec/**'
      - 'recettes/**/*.yaml'
      - 'recettes/**/*.yml'
      - 'recettes/template.yaml'
      - 'renv.lock'
      - 'renv/settings.json'
      - '.lintr'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Setup R environment
        uses: ./.github/actions/setup-r-livrec
        with:
          r-version: 'renv'

      - name: Lint livrec
        run: |
          Rscript -e 'source("renv/activate.R"); lintr::lint_package("livrec")'

      - name: Run livrec tests
        run: |
          Rscript -e 'source("renv/activate.R"); testthat::test_local("livrec")'

      - name: Validate recipe YAML files
        run: |
          Rscript -e 'source("renv/activate.R"); livrec::gha_validate_recipes()'

      - name: R CMD check livrec
        run: |
          Rscript --vanilla -e 'source("renv/activate.R"); build_status <- system("R --vanilla CMD build livrec"); if (build_status != 0) quit(status = build_status); check_status <- system("R --vanilla CMD check --no-manual --as-cran livrec_*.tar.gz"); quit(status = check_status)'
