name: Setup R + renv + livrec
description: Install R, restore renv cache, and install livrec with its dependencies.
inputs:
  r-version:
    description: R version to install
    required: false
    default: 'renv'
runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev pkg-config imagemagick libuv1-dev

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ inputs.r-version }}
        use-public-rspm: true

    - name: Restore R packages with renv
      uses: r-lib/actions/setup-renv@v2

    - name: Install local livrec package
      shell: bash
      run: |
        Rscript --vanilla -e 'source("renv/activate.R"); renv::install("./livrec", prompt = FALSE, dependencies = FALSE)'
